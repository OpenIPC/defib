<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>defib — Camera Recovery Tool</title>
<style>
:root {
  --bg: #1a1b26; --surface: #24283b; --surface2: #2f3449;
  --accent: #7aa2f7; --accent2: #bb9af7; --green: #9ece6a;
  --red: #f7768e; --yellow: #e0af68; --text: #c0caf5; --dim: #565f89;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
h1 { text-align: center; font-size: 2em; margin-bottom: 4px; }
h1 span { color: var(--accent); }
.subtitle { text-align: center; color: var(--dim); margin-bottom: 32px; font-size: 0.95em; }
.card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 1.1em; margin-bottom: 12px; color: var(--accent2); }
label { display: block; font-size: 0.85em; color: var(--dim); margin-bottom: 4px; margin-top: 12px; }
label:first-child { margin-top: 0; }
select, input[type="file"] {
  width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--dim);
  border-radius: var(--radius); color: var(--text); font-size: 0.95em; outline: none;
}
select:focus, input:focus { border-color: var(--accent); }
select option { background: var(--surface2); }
.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px;
  border: none; border-radius: var(--radius); font-size: 1em; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { filter: brightness(1.15); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--dim); }
.btn-secondary:hover { border-color: var(--accent); }
.btn-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
.checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
.checkbox-row input { accent-color: var(--accent); width: 16px; height: 16px; }
.progress-section { display: none; }
.progress-section.active { display: block; }
.stage-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.stage {
  padding: 6px 14px; border-radius: 20px; font-size: 0.85em; font-weight: 500;
  background: var(--surface2); color: var(--dim); transition: all 0.2s;
}
.stage.active { background: var(--accent); color: var(--bg); }
.stage.done { background: var(--green); color: var(--bg); }
.stage.error { background: var(--red); color: var(--bg); }
.progress-bar-wrap {
  background: var(--surface2); border-radius: 6px; height: 24px; overflow: hidden; margin: 12px 0;
}
.progress-bar {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 6px; transition: width 0.15s; width: 0%; display: flex;
  align-items: center; justify-content: flex-end; padding-right: 8px;
  font-size: 0.75em; font-weight: 700; color: var(--bg); min-width: 40px;
}
.log-panel {
  background: var(--bg); border: 1px solid var(--surface2); border-radius: var(--radius);
  padding: 12px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.82em;
  max-height: 250px; overflow-y: auto; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
}
.log-panel .info { color: var(--green); }
.log-panel .warn { color: var(--yellow); }
.log-panel .error { color: var(--red); }
.log-panel .dim { color: var(--dim); }
.status-msg { padding: 12px 16px; border-radius: var(--radius); margin-top: 12px; font-weight: 600; text-align: center; }
.status-msg.success { background: rgba(158,206,106,0.15); color: var(--green); }
.status-msg.failure { background: rgba(247,118,142,0.15); color: var(--red); }
.unsupported {
  background: var(--red); color: #fff; padding: 16px; border-radius: var(--radius);
  text-align: center; margin-bottom: 16px;
}
.hidden { display: none !important; }
.chip-count { color: var(--dim); font-size: 0.8em; }
footer { text-align: center; color: var(--dim); font-size: 0.8em; margin-top: 32px; padding-bottom: 24px; }
footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ <span>defib</span></h1>
  <p class="subtitle">Shocking dead devices back to life — WebSerial Edition</p>

  <div id="unsupported" class="unsupported hidden">
    Your browser does not support WebSerial API. Please use Chrome, Edge, or Opera.
  </div>

  <!-- Setup Card -->
  <div id="setup-card" class="card">
    <h2>Recovery Setup</h2>
    <label>Chip Model <span class="chip-count" id="chip-count"></span></label>
    <select id="chip-select"><option value="">Loading...</option></select>

    <label>Firmware File (U-Boot .bin)</label>
    <input type="file" id="file-input" accept=".bin,.img">

    <label>Serial Port</label>
    <div class="btn-row">
      <button class="btn btn-secondary" id="port-btn" onclick="selectPort()">Select Serial Port...</button>
      <span id="port-name" style="color:var(--dim);align-self:center;font-size:0.9em"></span>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="break-check">
      <label for="break-check" style="margin:0">Send Ctrl-C after upload (enter U-Boot console)</label>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="start-btn" onclick="startRecovery()" disabled>Start Recovery</button>
    </div>
  </div>

  <!-- Progress Card -->
  <div id="progress-card" class="card progress-section">
    <h2>Recovery Progress</h2>
    <div class="stage-row" id="stages">
      <div class="stage" data-stage="handshake">Handshake</div>
      <div class="stage" data-stage="ddr">DDR Init</div>
      <div class="stage" data-stage="spl">SPL</div>
      <div class="stage" data-stage="uboot">U-Boot</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar">0%</div>
    </div>
    <div class="log-panel" id="log-panel"></div>
    <div id="status-msg"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="resetUI()">New Recovery</button>
    </div>
  </div>

  <footer>
    <a href="https://github.com/OpenIPC/defib">OpenIPC/defib</a> — WebSerial requires Chrome 89+, Edge 89+, or Opera 76+
  </footer>
</div>

function calcCrc(data, crc = 0) {
  for (const b of data) crc = ((crc << 8) | b) ^ CRC_TABLE[(crc >> 8) & 0xff];
  for (let i = 0; i < 2; i++) crc = ((crc << 8) | 0) ^ CRC_TABLE[(crc >> 8) & 0xff];
  return crc & 0xffff;
}

function appendCrc(data) {
  const crc = calcCrc(data);
  const out = new Uint8Array(data.length + 2);
  out.set(data); out[data.length] = (crc >> 8) & 0xff; out[data.length + 1] = crc & 0xff;
  return out;
}

function appendCrcLE(data) {
  const crc = calcCrc(data);
  const out = new Uint8Array(data.length + 2);
  out.set(data); out[data.length] = crc & 0xff; out[data.length + 1] = (crc >> 8) & 0xff;
  return out;
}

// ============================================================
// Frame builders
// ============================================================
function buildHeadFrame(length, address) {
  const f = new Uint8Array(12);
  f[0]=0xfe; f[1]=0x00; f[2]=0xff; f[3]=0x01;
  f[4]=(length>>24)&0xff; f[5]=(length>>16)&0xff; f[6]=(length>>8)&0xff; f[7]=length&0xff;
  f[8]=(address>>24)&0xff; f[9]=(address>>16)&0xff; f[10]=(address>>8)&0xff; f[11]=address&0xff;
  return appendCrc(f);
}

function buildDataFrame(seq, payload) {
  const f = new Uint8Array(3 + payload.length);
  f[0] = 0xda; f[1] = seq & 0xff; f[2] = (~seq) & 0xff;
  f.set(payload, 3);
  return appendCrc(f);
}

function buildTailFrame(seq) {
  const f = new Uint8Array(3);
  f[0] = 0xed; f[1] = seq & 0xff; f[2] = (~seq) & 0xff;
  return appendCrc(f);
}

// ============================================================
// WebSerial Transport
// ============================================================
let serialPort = null;
let reader = null;
let readBuffer = [];
let abortController = null;

async function openPort(port) {
  await port.open({ baudRate: 115200, dataBits: 8, parity: 'none', stopBits: 1, bufferSize: 4096 });
  serialPort = port;
  abortController = new AbortController();
  // Start background reader
  _readLoop(port, abortController.signal);
}

async function _readLoop(port, signal) {
  while (port.readable && !signal.aborted) {
    try {
      reader = port.readable.getReader();
      while (true) {
        const { value, done } = await reader.read();
        if (done || signal.aborted) break;
        if (value) for (const b of value) readBuffer.push(b);
      }
    } catch (e) {
      if (!signal.aborted) console.error('Read error:', e);
    } finally {
      if (reader) { try { reader.releaseLock(); } catch(e){} reader = null; }
    }
  }
}

async function serialWrite(data) {
  if (!serialPort?.writable) throw new Error('Port not writable');
  const writer = serialPort.writable.getWriter();
  try { await writer.write(data instanceof Uint8Array ? data : new Uint8Array(data)); }
  finally { writer.releaseLock(); }
}

function serialRead(size, timeoutMs = 3000) {
  return new Promise((resolve, reject) => {
    const start = Date.now();
    const check = () => {
      if (readBuffer.length >= size) {
        resolve(new Uint8Array(readBuffer.splice(0, size)));
      } else if (Date.now() - start > timeoutMs) {
        if (readBuffer.length > 0) resolve(new Uint8Array(readBuffer.splice(0, readBuffer.length)));
        else reject(new Error(`Timeout reading ${size} bytes`));
      } else {
        setTimeout(check, 5);
      }
    };
    check();
  });
}

function serialReadAvailable() {
  const data = new Uint8Array(readBuffer.splice(0, readBuffer.length));
  return data;
}

function serialFlush() { readBuffer.length = 0; }

async function closePort() {
  if (abortController) abortController.abort();
  if (reader) { try { reader.releaseLock(); } catch(e){} reader = null; }
  if (serialPort) { try { await serialPort.close(); } catch(e){} serialPort = null; }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
// Protocol: Standard HiSilicon
// ============================================================
async function sendFrameWithRetry(data, retries, timeoutMs) {
  for (let i = 0; i < retries; i++) {
    serialFlush();
    await serialWrite(data);
    try {
      const ack = await serialRead(1, timeoutMs);
      if (ack[0] === 0xaa) return true;
    } catch (e) { /* timeout, retry */ }
  }
  return false;
}

async function standardHandshake() {
  log('Waiting for bootrom... power-cycle the device now', 'info');
  setStage('handshake');
  let counter = 0;
  for (let i = 0; i < 300; i++) { // ~30 seconds
    try {
      const b = await serialRead(1, 100);
      if (b[0] === 0x00) continue;
      if (b[0] === 0x20) counter++; else counter = 0;
      if (counter >= 5) {
        serialFlush();
        await serialWrite(new Uint8Array([0xaa]));
        serialFlush();
        log('Boot mode entered!', 'info');
        return true;
      }
    } catch (e) { /* timeout, keep waiting */ }
  }
  log('Handshake timeout — no bootrom response', 'error');
  return false;
}

async function standardSendFirmware(firmware, profile) {
  const ddrAddr = parseInt(profile.ADDRESS[0], 16);
  const splAddr = parseInt(profile.ADDRESS[1], 16);
  const ubootAddr = parseInt(profile.ADDRESS[2], 16);
  const splMax = parseInt(profile.FILELEN[1], 16);
  const ddrStep = new Uint8Array(profile.DDRSTEP0);

  // DDR step
  setStage('ddr');
  log('Sending DDR step (64 bytes)...', 'info');
  if (!await sendFrameWithRetry(buildHeadFrame(64, ddrAddr), 16, 30)) return fail('DDR HEAD failed');
  if (!await sendFrameWithRetry(buildDataFrame(1, ddrStep), 32, 150)) return fail('DDR DATA failed');
  if (!await sendFrameWithRetry(buildTailFrame(2), 16, 150)) return fail('DDR TAIL failed');
  completeStage('ddr');

  // SPL
  setStage('spl');
  const splData = firmware.slice(0, splMax);
  log(`Sending SPL (${splData.length} bytes)...`, 'info');
  if (!await sendFrameWithRetry(buildHeadFrame(splMax, splAddr), 16, 30)) return fail('SPL HEAD failed');
  const splChunks = chunkData(splData);
  for (let i = 0; i < splChunks.length; i++) {
    if (!await sendFrameWithRetry(buildDataFrame(i + 1, splChunks[i]), 32, 150)) return fail(`SPL chunk ${i+1} failed`);
    setProgress(i + 1, splChunks.length + 1, 'SPL');
  }
  if (!await sendFrameWithRetry(buildTailFrame(splChunks.length + 1), 16, 150)) return fail('SPL TAIL failed');
  completeStage('spl');

  // U-Boot
  setStage('uboot');
  log(`Sending U-Boot (${firmware.length} bytes)...`, 'info');
  if (!await sendFrameWithRetry(buildHeadFrame(firmware.length, ubootAddr), 16, 30)) return fail('U-Boot HEAD failed');
  const ubootChunks = chunkData(firmware);
  for (let i = 0; i < ubootChunks.length; i++) {
    if (!await sendFrameWithRetry(buildDataFrame(i + 1, ubootChunks[i]), 32, 150)) return fail(`U-Boot chunk ${i+1} failed`);
    setProgress(i + 1, ubootChunks.length + 1, 'U-Boot');
  }
  if (!await sendFrameWithRetry(buildTailFrame(ubootChunks.length + 1), 16, 150)) return fail('U-Boot TAIL failed');
  completeStage('uboot');
  return true;
}

// ============================================================
// Protocol: V500
// ============================================================
async function sendFrmWaitAck(data, timeoutMs = 4000) {
  await serialWrite(data);
  let retries = 0;
  const start = Date.now();
  while (Date.now() - start < timeoutMs && retries < 10) {
    try {
      const r = await serialRead(1, timeoutMs);
      if (r[0] === 0xaa) return true;
      if (r[0] === 0x55) { await serialWrite(data); retries++; continue; } // NAK
    } catch (e) { return false; }
  }
  return false;
}

async function sendDataToBootrom(data, address, label, onProgress) {
  const head = appendCrc(new Uint8Array([
    0xfe, 0x00, 0xff, 0x01,
    (data.length>>24)&0xff, (data.length>>16)&0xff, (data.length>>8)&0xff, data.length&0xff,
    (address>>24)&0xff, (address>>16)&0xff, (address>>8)&0xff, address&0xff,
  ]));
  if (!await sendFrmWaitAck(head)) return false;
  let idx = 0, pos = 0, remaining = data.length;
  while (remaining > 0) {
    idx++;
    const n = Math.min(1024, remaining);
    const chunk = data.slice(pos, pos + n);
    pos += n; remaining -= n;
    const frm = appendCrc(new Uint8Array([0xda, idx & 0xff, (~idx) & 0xff, ...chunk]));
    if (onProgress) onProgress(pos, data.length);
    if (!await sendFrmWaitAck(frm)) return false;
  }
  const count = Math.ceil(data.length / 1024) + 1;
  const tail = appendCrc(new Uint8Array([0xed, count & 0xff, (~count) & 0xff]));
  return await sendFrmWaitAck(tail);
}

async function v500Handshake() {
  log('Sending V500 handshake... power-cycle device now', 'info');
  setStage('handshake');
  const frame = appendCrc(new Uint8Array([0xbd,0x00,0xff,0x01,0,0,0,0,0,0,0,0]));
  const start = Date.now();
  while (Date.now() - start < 20000) {
    await serialWrite(frame);
    try {
      const resp = await serialRead(14, 100);
      if (resp[0] === 0xbd && resp[1] === 0x00) {
        const chipId = (resp[8]<<24)|(resp[9]<<16)|(resp[10]<<8)|resp[11];
        log(`Detected SoC: 0x${chipId.toString(16)}`, 'info');
        return true;
      }
    } catch (e) { /* timeout */ }
  }
  log('V500 handshake timeout', 'error');
  return false;
}

async function v500SendFirmware(firmware) {
  setStage('spl');
  const headAreaLen = 8192;
  const headAreaData = firmware.slice(0, headAreaLen);
  const view = new DataView(firmware.buffer, firmware.byteOffset);
  const auxLen = view.getUint32(1024, true);
  const auxData = firmware.slice(8192, 8192 + auxLen);

  log(`Sending HEAD area (${headAreaLen} bytes)...`, 'info');
  if (!await sendDataToBootrom(headAreaData, 0, 'HEAD', (s,t) => setProgress(s,t,'HEAD'))) return fail('HEAD area failed');
  log(`Sending AUX area (${auxLen} bytes)...`, 'info');
  if (!await sendDataToBootrom(auxData, 8192, 'AUX', (s,t) => setProgress(s,t,'AUX'))) return fail('AUX area failed');
  completeStage('spl');

  await sleep(100);
  setStage('uboot');
  log(`Sending BOOT image (${firmware.length} bytes)...`, 'info');
  if (!await sendDataToBootrom(firmware, 0x41000000, 'BOOT', (s,t) => setProgress(s,t,'U-Boot'))) return fail('BOOT failed');
  completeStage('uboot');
  return true;
}

// ============================================================
// Protocol: CV6xx
// ============================================================
async function cv6xxHandshake() {
  log('Sending CV6xx handshake... power-cycle device now', 'info');
  setStage('handshake');
  const frame = new Uint8Array(16);
  frame.set([0xef,0xbe,0xad,0xde,0x12,0x00,0xf0,0x0f]);
  // baudrate 115200 = 0x0001C200 LE
  frame[8]=0x00; frame[9]=0xc2; frame[10]=0x01; frame[11]=0x00;
  frame.set([8,1,0,9], 12);
  const hsFrame = appendCrcLE(frame);

  const buf = [];
  while (true) {
    await serialWrite(hsFrame);
    await sleep(10);
    const avail = serialReadAvailable();
    for (const b of avail) buf.push(b);
    const str = String.fromCharCode(...buf);
    if (str.includes('uart ddr') || str.includes('uart flash')) {
      log('BootROM handshake complete', 'info');
      await sleep(500);
      serialFlush();
      return true;
    }
  }
}

function parseCv6xxBoot(data) {
  const view = new DataView(data.buffer, data.byteOffset);
  // GSL
  const gslMagic = view.getUint32(2048, true);
  if (gslMagic !== 0x4BB4D22D) throw new Error(`Invalid GSL magic: 0x${gslMagic.toString(16)}`);
  const gslLen = view.getUint32(2084, true);
  const gslSize = gslLen + 3072;
  const gslData = data.slice(0, gslSize);
  // DDR params
  const paramsStart = gslSize + 1024;
  const paramsMagic = view.getUint32(paramsStart, true);
  if (paramsMagic !== 0x4B87A52D) throw new Error(`Invalid DDR params magic: 0x${paramsMagic.toString(16)}`);
  const offset32 = view.getUint32(paramsStart + 32, true);
  const tableSize = view.getUint32(paramsStart + 36, true);
  const tableCount = view.getUint32(paramsStart + 40, true);
  const boardMapping = data.slice(paramsStart + 300, paramsStart + 308);
  // U-Boot
  const ubootMagicBytes = new Uint8Array([0x2d,0x1e,0xf0,0x4b]); // 0x4BF01E2D LE
  let ubootOffset = -1;
  for (let i = paramsStart; i < data.length - 4; i++) {
    if (data[i]===0x2d && data[i+1]===0x1e && data[i+2]===0xf0 && data[i+3]===0x4b) { ubootOffset = i; break; }
  }
  if (ubootOffset < 0) throw new Error('U-Boot magic not found');
  const ubootLen = view.getUint32(ubootOffset + 36, true);
  const ubootData = data.slice(ubootOffset, ubootOffset + ubootLen + 1024);

  log(`GSL: ${gslData.length}B, DDR tables: ${tableCount} (${tableSize}B each), U-Boot: ${ubootData.length}B`, 'dim');

  // Build DDR table for board_id=0
  const mappedIdx = Math.min(boardMapping[0], tableCount - 1);
  const ddrBuf = new Uint8Array(2048 + tableSize);
  ddrBuf.set(data.slice(gslSize, gslSize + 2048));
  const tblOff = gslSize + 2048 + offset32 + mappedIdx * tableSize;
  ddrBuf.set(data.slice(tblOff, tblOff + tableSize), 2048);

  return { gslData, ddrTable: ddrBuf, ubootData };
}

async function cv6xxSendFirmware(firmware) {
  const parts = parseCv6xxBoot(firmware);

  setStage('ddr');
  log(`Sending GSL (${parts.gslData.length} bytes)...`, 'info');
  if (!await sendDataToBootrom(parts.gslData, 0x04020000, 'GSL', (s,t) => setProgress(s,t,'GSL'))) return fail('GSL failed');

  log(`Sending DDR table (${parts.ddrTable.length} bytes)...`, 'info');
  if (!await sendDataToBootrom(parts.ddrTable, 0x41000000, 'DDR', (s,t) => setProgress(s,t,'DDR'))) return fail('DDR table failed');
  completeStage('ddr');

  // Wait for DDR training
  log('Waiting for DDR training...', 'dim');
  await sleep(1500);
  const training = serialReadAvailable();
  if (training.length > 0) {
    const txt = String.fromCharCode(...training).replace(/[^\x20-\x7e\n\r]/g, '');
    if (txt.trim()) log('DDR: ' + txt.trim(), 'dim');
  }

  setStage('uboot');
  log(`Sending U-Boot (${parts.ubootData.length} bytes)...`, 'info');
  if (!await sendDataToBootrom(parts.ubootData, 0x41000000, 'UBOOT', (s,t) => setProgress(s,t,'U-Boot'))) return fail('U-Boot failed');
  completeStage('uboot');
  return true;
}

// ============================================================
// Helpers
// ============================================================
function chunkData(data, size = 1024) {
  const chunks = [];
  for (let i = 0; i < data.length; i += size)
    chunks.push(data.slice(i, Math.min(i + size, data.length)));
  return chunks;
}

// ============================================================
// UI Logic
// ============================================================
let selectedPort = null;
let firmwareData = null;

function initChipSelector() {
  const sel = document.getElementById('chip-select');
  const allChips = [
    ...Object.keys(PROFILES),
    ...V500_SOCS,
    ...CV6XX_SOCS
  ];
  const unique = [...new Set(allChips)].sort();
  sel.innerHTML = '<option value="">— Select chip model —</option>';
  for (const c of unique) sel.innerHTML += `<option value="${c}">${c}</option>`;
  document.getElementById('chip-count').textContent = `(${unique.length} supported)`;
  sel.onchange = updateStartButton;
}

async function selectPort() {
  try {
    selectedPort = await navigator.serial.requestPort();
    document.getElementById('port-name').textContent = 'Port selected ✓';
    updateStartButton();
  } catch (e) {
    if (e.name !== 'NotAllowedError') log('Port selection failed: ' + e.message, 'error');
  }
}

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) { firmwareData = null; updateStartButton(); return; }
  firmwareData = new Uint8Array(await file.arrayBuffer());
  updateStartButton();
});

function updateStartButton() {
  const chip = document.getElementById('chip-select').value;
  document.getElementById('start-btn').disabled = !(chip && firmwareData && selectedPort);
}

function setStage(name) {
  const map = { handshake:'handshake', ddr:'ddr', ddr_init:'ddr', spl:'spl', gsl:'spl', uboot:'uboot' };
  const key = map[name] || name;
  document.querySelectorAll('.stage').forEach(el => {
    if (el.dataset.stage === key && !el.classList.contains('done'))
      el.classList.add('active');
  });
}

function completeStage(name) {
  document.querySelectorAll('.stage').forEach(el => {
    if (el.dataset.stage === name) { el.classList.remove('active'); el.classList.add('done'); }
  });
}

function setProgress(sent, total, label) {
  const pct = Math.min(100, Math.round(sent / total * 100));
  const bar = document.getElementById('progress-bar');
  bar.style.width = pct + '%';
  bar.textContent = label ? `${label} ${pct}%` : pct + '%';
}

function log(msg, cls = '') {
  const panel = document.getElementById('log-panel');
  const time = new Date().toLocaleTimeString();
  panel.innerHTML += `<span class="dim">${time}</span> <span class="${cls}">${msg}</span>\n`;
  panel.scrollTop = panel.scrollHeight;
}

function fail(msg) { log(msg, 'error'); return false; }

function showResult(success, msg) {
  const el = document.getElementById('status-msg');
  el.className = 'status-msg ' + (success ? 'success' : 'failure');
  el.textContent = msg;
}

function resetUI() {
  document.getElementById('setup-card').style.display = '';
  document.getElementById('progress-card').classList.remove('active');
  document.querySelectorAll('.stage').forEach(el => { el.classList.remove('active','done','error'); });
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('progress-bar').textContent = '0%';
  document.getElementById('log-panel').innerHTML = '';
  document.getElementById('status-msg').className = '';
  document.getElementById('status-msg').textContent = '';
}

async function startRecovery() {
  const chip = document.getElementById('chip-select').value;
  const sendBreak = document.getElementById('break-check').checked;

  document.getElementById('setup-card').style.display = 'none';
  document.getElementById('progress-card').classList.add('active');
  readBuffer.length = 0;

  const startTime = Date.now();
  let success = false;

  try {
    await openPort(selectedPort);

    if (V500_SOCS.has(chip)) {
      if (!await v500Handshake()) { showResult(false, 'Handshake failed'); return; }
      completeStage('handshake');
      success = await v500SendFirmware(firmwareData);
    } else if (CV6XX_SOCS.has(chip)) {
      if (!await cv6xxHandshake()) { showResult(false, 'Handshake failed'); return; }
      completeStage('handshake');
      success = await cv6xxSendFirmware(firmwareData);
    } else {
      const profile = PROFILES[chip];
      if (!profile) { log('No profile for chip: ' + chip, 'error'); showResult(false, 'Unknown chip'); return; }
      if (!await standardHandshake()) { showResult(false, 'Handshake failed'); return; }
      completeStage('handshake');
      success = await standardSendFirmware(firmwareData, profile);
    }

    if (success && sendBreak) {
      log('Sending Ctrl-C to enter U-Boot console...', 'info');
      for (let i = 0; i < 49; i++) { await serialWrite(new Uint8Array([0x03])); await sleep(20); }
    }

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    if (success) {
      setProgress(1, 1, 'Done');
      log(`Recovery complete in ${elapsed}s`, 'info');
      showResult(true, `Recovery successful! (${elapsed}s)`);
    } else {
      showResult(false, 'Recovery failed — check log for details');
    }
  } catch (e) {
    log('Error: ' + e.message, 'error');
    showResult(false, 'Error: ' + e.message);
  } finally {
    await closePort();
  }
}

// Init
if (!('serial' in navigator)) {
  document.getElementById('unsupported').classList.remove('hidden');
  document.getElementById('setup-card').style.display = 'none';
} else {
  initChipSelector();
}
</script>
